<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
            background: #fafafa;
        }
        @media (min-width: 500px) {
            body {
                max-width: 600px;
                margin: 40px auto;
                padding: 0 20px;
            }
        }
        h1 { margin-bottom: 16px; font-size: 1.3em; }
        .subtitle { color: #666; margin-bottom: 20px; font-size: 0.85em; }
        @media (min-width: 500px) {
            h1 { font-size: 1.8em; }
            .subtitle { margin-bottom: 32px; font-size: 1em; }
        }
        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }
        @media (min-width: 500px) {
            fieldset { padding: 20px 24px; }
        }
        legend {
            font-weight: 600;
            font-size: 1.05em;
            padding: 0 8px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .hint {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95em;
            box-sizing: border-box;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .color-row input[type="color"] {
            width: 40px;
            height: 32px;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 2px;
            cursor: pointer;
        }
        .color-row .color-hex {
            font-family: monospace;
            font-size: 0.9em;
            color: #666;
        }
        .switch-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .switch-row label {
            margin-bottom: 0;
            cursor: pointer;
        }
        .switch {
            position: relative;
            width: 40px;
            height: 22px;
            flex-shrink: 0;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .switch .slider {
            position: absolute;
            inset: 0;
            background: #ccc;
            border-radius: 22px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .switch .slider::before {
            content: '';
            position: absolute;
            left: 3px;
            top: 3px;
            width: 16px;
            height: 16px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        .switch input:checked + .slider {
            background: #0066cc;
        }
        .switch input:checked + .slider::before {
            transform: translateX(18px);
        }
        .action-row {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
            margin: -8px -8px 0 0;
        }
        .action-row span {
            font-size: 0.75em;
            color: #888;
        }
        .action-row .status {
            margin-left: 0;
        }
        .icon-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 24px;
            height: 24px;
            flex-shrink: 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            background: #fff;
            color: #0066cc;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        .icon-btn:hover {
            background: #f0f7ff;
            border-color: #0066cc;
        }
        .icon-btn svg {
            width: 13px;
            height: 13px;
        }
        .bg-color-row { margin-left: 24px; }
        .preview-box {
            border-left: 3px solid #0066cc;
            padding-left: 8px;
            margin-top: 12px;
            color: #0066cc;
            font-size: 0.95em;
            line-height: 1.6;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
        }
        .btn-primary {
            background: #0066cc;
            color: #fff;
        }
        .btn-primary:hover { background: #0052a3; }
        .status {
            display: inline-block;
            margin-left: 12px;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .status.show { opacity: 1; }
        .status.ok { color: #2e7d32; }
        .status.err { color: #c62828; }
        .loading-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .loading-overlay.show { display: flex; }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 4px solid #ddd;
            border-top-color: #0066cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div style="display:flex;align-items:baseline;gap:12px;margin-bottom:16px;">
    <h1 data-i18n="optionsTitle" style="margin:0;">Configuration</h1>
    <span id="status" class="status"></span>
</div>

<fieldset>
    <legend data-i18n="prefSection">Translation</legend>
    <div class="action-row">
        <span data-i18n="resetFab">Restore default floating button position</span>
        <button id="reset-fab-btn" class="icon-btn" aria-label="Restore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <span id="reset-fab-status" class="status"></span>
    </div>

    <label for="target-lang" data-i18n="targetLangLabel">Target language</label>
    <select id="target-lang"></select>

    <div style="margin-top: 12px;">
        <label for="font-size" data-i18n="fontSize">Translation font size</label>
        <select id="font-size"></select>
    </div>

    <div class="switch-row" style="margin-top: 12px;">
        <label class="switch"><input type="checkbox" id="hidden-mode"><span class="slider"></span></label>
        <label for="hidden-mode" data-i18n="hiddenMode">Hidden mode (click to reveal translation)</label>
    </div>

    <div class="switch-row" style="margin-top: 12px;">
        <label class="switch"><input type="checkbox" id="show-fab"><span class="slider"></span></label>
        <label for="show-fab" data-i18n="showFab">Show floating button</label>
    </div>
</fieldset>

<fieldset>
    <legend data-i18n="selectionSection">Selection translation</legend>

    <div class="switch-row">
        <label class="switch"><input type="checkbox" id="selection-enabled"><span class="slider"></span></label>
        <label for="selection-enabled" data-i18n="selectionEnable">Enable selection translation</label>
    </div>
    <div class="switch-row" id="selection-auto-row" style="display:none; margin-left: 24px;">
        <label class="switch"><input type="checkbox" id="selection-auto-popup"><span class="slider"></span></label>
        <label for="selection-auto-popup" data-i18n="selectionAutoPopup">Auto show translation on selection</label>
    </div>
    <div id="selection-lang-row" style="display:none; margin-top: 12px;">
        <label for="selection-target-lang" data-i18n="selectionLangLabel">Default language for selection</label>
        <select id="selection-target-lang"></select>
    </div>
</fieldset>

<fieldset>
    <legend data-i18n="styleSection">Style</legend>

    <label data-i18n="textColor">Text color</label>
    <div class="color-row">
        <input type="color" id="text-color" value="#0066cc">
        <span class="color-hex" id="text-color-hex">#0066cc</span>
    </div>

    <div class="switch-row">
        <label class="switch"><input type="checkbox" id="bg-enabled"><span class="slider"></span></label>
        <label for="bg-enabled" data-i18n="showBgColor">Show background color</label>
    </div>
    <div class="color-row bg-color-row" id="bg-color-row">
        <input type="color" id="bg-color" value="#f0f7ff">
        <span class="color-hex" id="bg-color-hex">#f0f7ff</span>
    </div>

    <label data-i18n="preview">Preview</label>
    <div id="preview" class="preview-box" data-i18n="previewText">This is a sample translation preview.</div>
</fieldset>

<fieldset>
    <legend data-i18n="configSection">Settings</legend>
    <div class="action-row">
        <span data-i18n="clearUiCache">Restore default display language (English)</span>
        <button id="clear-ui-cache-btn" class="icon-btn" aria-label="Restore">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        </button>
        <span id="clear-ui-cache-status" class="status"></span>
    </div>
    <label for="ui-lang" data-i18n="uiLangLabel">Configuration display language</label>
    <select id="ui-lang"></select>
</fieldset>

<div id="loading-overlay" class="loading-overlay"><div class="loading-spinner"></div></div>
<div id="confirm-overlay" class="loading-overlay" style="cursor:default;">
    <div style="background:#fff;border-radius:10px;padding:24px;max-width:360px;box-shadow:0 4px 20px rgba(0,0,0,0.15);text-align:center;">
        <p id="confirm-message" style="margin-bottom:16px;font-size:0.95em;color:#333;"></p>
        <button id="confirm-yes" class="btn btn-primary" style="margin-right:8px;">OK</button>
        <button id="confirm-no" class="btn" style="background:#e0e0e0;color:#333;">Cancel</button>
    </div>
</div>

<script type="module" src="./index.js"></script>
</body>
</html>
