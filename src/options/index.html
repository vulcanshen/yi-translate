<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: #333;
        }
        h1 { margin-bottom: 4px; }
        .subtitle { color: #666; margin-bottom: 32px; }
        fieldset {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px 24px;
            margin-bottom: 20px;
        }
        legend {
            font-weight: 600;
            font-size: 1.05em;
            padding: 0 8px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .hint {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 8px;
        }
        select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 0.95em;
            box-sizing: border-box;
        }
        .color-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }
        .color-row input[type="color"] {
            width: 40px;
            height: 32px;
            border: 1px solid #ccc;
            border-radius: 6px;
            padding: 2px;
            cursor: pointer;
        }
        .color-row .color-hex {
            font-family: monospace;
            font-size: 0.9em;
            color: #666;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .checkbox-row label {
            margin-bottom: 0;
        }
        .checkbox-row input[type="checkbox"] {
            width: 16px;
            height: 16px;
        }
        .bg-color-row { margin-left: 24px; }
        .preview-box {
            border-left: 3px solid #0066cc;
            padding-left: 8px;
            margin-top: 12px;
            color: #0066cc;
            font-size: 0.95em;
            line-height: 1.6;
        }
        .btn {
            padding: 8px 20px;
            border: none;
            border-radius: 6px;
            font-size: 0.95em;
            cursor: pointer;
        }
        .btn-primary {
            background: #0066cc;
            color: #fff;
        }
        .btn-primary:hover { background: #0052a3; }
        .status {
            display: inline-block;
            margin-left: 12px;
            font-size: 0.9em;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .status.show { opacity: 1; }
        .status.ok { color: #2e7d32; }
        .status.err { color: #c62828; }
    </style>
</head>
<body>
<h1 data-i18n="optionsTitle">譯 - Settings</h1>
<p class="subtitle" data-i18n="subtitle">Open-source bilingual translation</p>

<fieldset>
    <legend data-i18n="prefSection">Translation</legend>

    <label for="target-lang" data-i18n="targetLangLabel">Target language</label>
    <p class="hint" data-i18n="targetLangHint">Uses Google Translate (free). No API key required.</p>
    <select id="target-lang"></select>
</fieldset>

<fieldset>
    <legend data-i18n="selectionSection">Selection translation</legend>

    <div class="checkbox-row">
        <input type="checkbox" id="selection-enabled">
        <label for="selection-enabled" data-i18n="selectionEnable">Enable selection translation</label>
    </div>
    <div id="selection-lang-row" style="display:none; margin-top: 12px;">
        <label for="selection-target-lang" data-i18n="selectionLangLabel">Default language for selection</label>
        <select id="selection-target-lang"></select>
    </div>
</fieldset>

<fieldset>
    <legend data-i18n="styleSection">Style</legend>

    <label data-i18n="textColor">Text color</label>
    <div class="color-row">
        <input type="color" id="text-color" value="#0066cc">
        <span class="color-hex" id="text-color-hex">#0066cc</span>
    </div>

    <div class="checkbox-row">
        <input type="checkbox" id="bg-enabled">
        <label for="bg-enabled" data-i18n="showBgColor">Show background color</label>
    </div>
    <div class="color-row bg-color-row" id="bg-color-row">
        <input type="color" id="bg-color" value="#f0f7ff">
        <span class="color-hex" id="bg-color-hex">#f0f7ff</span>
    </div>

    <label data-i18n="preview">Preview</label>
    <div id="preview" class="preview-box" data-i18n="previewText">This is a sample translation preview.</div>
</fieldset>

<button id="save-btn" class="btn btn-primary" data-i18n="save">Save</button>
<span id="status" class="status"></span>

<script type="module" src="./index.js"></script>
</body>
</html>
